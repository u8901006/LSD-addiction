<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LSD 成癮研究 · 文獻日報</title>
<meta name="description" content="LSD 成癮研究文獻日報 - 每日自動從 PubMed 彙整最新 LSD/迷幻藥成癮相關研究"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍄</text></svg>"/>
<style>
  :root { --bg: #f6f1e8; --surface: #fffaf2; --line: #d8c5ab; --text: #2b2118; --muted: #766453; --accent: #8c4f2b; --accent-soft: #ead2bf; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at top, #fff6ea 0, var(--bg) 55%, #ead8c6 100%); color: var(--text); font-family: "Noto Sans TC", "PingFang TC", "Helvetica Neue", Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { position: relative; z-index: 1; max-width: 640px; padding: 80px 24px; text-align: center; }
  .logo { font-size: 64px; margin-bottom: 24px; }
  h1 { font-size: 28px; color: var(--text); margin-bottom: 8px; }
  .subtitle { color: var(--accent); font-size: 16px; margin-bottom: 16px; }
  .description { color: var(--muted); font-size: 14px; line-height: 1.8; max-width: 480px; margin: 0 auto 48px; }
  .clinic-links { display: flex; flex-direction: column; gap: 8px; max-width: 400px; margin: 0 auto; }
  .clinic-link { display: flex; align-items: center; gap: 12px; padding: 14px 20px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; text-decoration: none; color: var(--text); transition: all 0.2s; font-size: 14px; text-align: left; }
  .clinic-link:hover { background: var(--accent-soft); border-color: var(--accent); transform: translateX(4px); }
  .clinic-icon { font-size: 22px; flex-shrink: 0; }
  .clinic-name { flex: 1; }
  .clinic-arrow { color: var(--accent); font-weight: 700; }
  footer { margin-top: 56px; font-size: 12px; color: var(--muted); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🍄</div>
  <h1>LSD 成癮研究</h1>
  <p class="subtitle">文獻日報 · 即將上線</p>
  <p class="description">每日自動從 PubMed 抓取最新 LSD/迷幻藥成癮相關研究文獻，由 AI 總結、分類。第一份日報將於近期自動產生。</p>
  <div class="clinic-links">
    <a href="https://www.leepsyclinic.com/" class="clinic-link" target="_blank" rel="noopener">
      <span class="clinic-icon">🏥</span>
      <span class="clinic-name">李政洋身心診所首頁</span>
      <span class="clinic-arrow">→</span>
    </a>
    <a href="https://blog.leepsyclinic.com/" class="clinic-link" target="_blank" rel="noopener">
      <span class="clinic-icon">📬</span>
      <span class="clinic-name">訂閱電子報</span>
      <span class="clinic-arrow">→</span>
    </a>
    <a href="https://buymeacoffee.com/CYlee" class="clinic-link" target="_blank" rel="noopener">
      <span class="clinic-icon">☕</span>
      <span class="clinic-name">Buy me a coffee</span>
      <span class="clinic-arrow">→</span>
    </a>
  </div>
  <footer>
    <p>Powered by PubMed + Zhipu AI · <a href="https://github.com/u8901006/LSD-addiction">GitHub</a></p>
  </footer>
</div>
</body>
</html>
